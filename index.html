<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentCongo - Job Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="navbar">
    <div class="logo">TalentCongo 🇨🇬</div>
    <div id="authHeader">
      <button class="btn" onclick="toggleAuthModal(true)">Sign In / Register</button>
    </div>
  </nav>

  <div id="authModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <div class="modal-tabs">
        <button id="tabLogin" class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button id="tabRegister" class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <form id="loginForm" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" required placeholder="name@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Connect</button>
      </form>

      <form id="registerForm" onsubmit="handleSignUp(event)" style="display: none;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regFullName" required placeholder="Arthur Mirabeau">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" required placeholder="name@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" required placeholder="•••••••• (min 6 chars)">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <button class="btn-close" onclick="toggleAuthModal(false)">Close</button>
    </div>
  </div>

  <main class="main-container">
    <h2 style="margin-bottom: 20px;">Latest Job Opportunities</h2>
    <div id="jobsList">
      <p style="color: gray;">Connect to see premium offers...</p>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
